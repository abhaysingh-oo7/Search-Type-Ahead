server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service
    location /suggest { proxy_pass http://backend:3001; }
    location /search { proxy_pass http://backend:3001; }
    location /trending { proxy_pass http://backend:3001; }
    location /stats { proxy_pass http://backend:3001; }
    location /cache/debug { proxy_pass http://backend:3001; }
}
